services:
  mysql:
    image: mysql:8.0
    container_name: smitgate-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: smitgate
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: smitgate-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smitgate?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:-SmitGate2024SecretKey!}
      FB_APP_ID: ${FB_APP_ID:-}
      FB_APP_SECRET: ${FB_APP_SECRET:-}
      FB_REDIRECT_URI: ${FB_REDIRECT_URI:-http://localhost:3000/auth/facebook/callback}
      POSCAKE_BASE_URL: ${POSCAKE_BASE_URL:-https://api.poscake.com}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: smitgate-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
