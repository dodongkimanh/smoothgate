server:
  port: 8080

spring:
  cache:
    type: simple

  datasource:
    url: jdbc:mysql://localhost:3306/smitgate?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD:trungkien}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration/mysql
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

app:
  timezone: ${APP_TIMEZONE:Asia/Ho_Chi_Minh}
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 86400000

  encryption:
    secret: ${ENCRYPTION_SECRET:SmitGate2024SecretKey!}

  facebook:
    app-id: ${FB_APP_ID:your_facebook_app_id}
    app-secret: ${FB_APP_SECRET:your_facebook_app_secret}
    redirect-uri: ${FB_REDIRECT_URI:http://localhost:8080/api/integrations/meta/oauth/callback}
    api-version: v20.0

  google:
    client-id: ${GOOGLE_CLIENT_ID:your_google_client_id}
    client-secret: ${GOOGLE_CLIENT_SECRET:your_google_client_secret}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/auth/google/callback}

  poscake:
    base-url: ${POSCAKE_BASE_URL:https://pos.pages.fm/api/v1}
    timestamp-source-timezone: ${POSCAKE_TIMESTAMP_SOURCE_TIMEZONE:UTC}
    fallback-api-key: ${POSCAKE_FALLBACK_API_KEY:}

  sync:
    pos:
      page-size: ${SYNC_POS_PAGE_SIZE:100}
      read-timeout-seconds: ${SYNC_POS_READ_TIMEOUT_SECONDS:90}
      max-pages-per-shop: ${SYNC_POS_MAX_PAGES_PER_SHOP:200}
      max-pages-per-shop-full: ${SYNC_POS_MAX_PAGES_PER_SHOP_FULL:3000}
      max-orders-per-shop: ${SYNC_POS_MAX_ORDERS_PER_SHOP:20000}
      max-orders-per-shop-full: ${SYNC_POS_MAX_ORDERS_PER_SHOP_FULL:200000}
      max-raw-json-chars: ${SYNC_POS_MAX_RAW_JSON_CHARS:5000}
      max-consecutive-upsert-failures: ${SYNC_POS_MAX_CONSECUTIVE_UPSERT_FAILURES:25}
    ads:
      max-rows-per-account: ${SYNC_ADS_MAX_ROWS_PER_ACCOUNT:5000}
      max-campaigns-per-account: ${SYNC_ADS_MAX_CAMPAIGNS_PER_ACCOUNT:2000}
      max-raw-json-chars: ${SYNC_ADS_MAX_RAW_JSON_CHARS:8000}

  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

  agent:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    telegram-bot-token: ${TELEGRAM_BOT_TOKEN:}
    telegram-chat-id: ${TELEGRAM_CHAT_ID:}
    analysis-interval-ms: ${AGENT_ANALYSIS_INTERVAL_MS:3600000}
    analysis-initial-delay-ms: ${AGENT_ANALYSIS_INITIAL_DELAY_MS:120000}
    enabled: ${AGENT_ENABLED:false}

logging:
  level:
    com.smitgate: DEBUG
    org.springframework.security: DEBUG
